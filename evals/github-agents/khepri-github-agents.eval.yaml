description: Project Khepri GitHub custom agent profile evaluation
tags:
  - khepri
  - github-custom-agents
  - agent-evals

tests:
  - id: profile-schema
    criteria: All Project Khepri GitHub custom agents exist with valid frontmatter, prompts, and supported GitHub Copilot tool aliases.
    input: Inspect .github/agents for Project Khepri custom agent profiles.
    expected_output:
      agent_profiles:
        - khepri-orchestrator
        - khepri-spec
        - khepri-knowledge
        - app-modernization
        - data-modernization
        - infra-modernization
        - security-modernization
        - khepri-planner
        - khepri-squad-generator
        - khepri-scaffold
        - khepri-code
        - khepri-test
        - khepri-modernization-assessor
        - khepri-evolution
    assertions:
      - name: profile-schema
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: profile-schema

  - id: orchestration-subagents
    criteria: The orchestration agent can invoke subagents, starts khepri-evolution as a continuous companion, and encodes the implemented modernization sequence.
    input: Inspect the orchestrator profile for subagent delegation, parallel evolution, and phase order.
    expected_output:
      required_sequence:
        - khepri-evolution
        - khepri-spec
        - khepri-knowledge
        - app-modernization
        - data-modernization
        - infra-modernization
        - security-modernization
        - khepri-planner
        - khepri-squad-generator
        - khepri-scaffold
        - khepri-code
        - khepri-test
        - khepri-modernization-assessor
      parallel_companion: khepri-evolution
    assertions:
      - name: orchestration-subagents
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: orchestration-subagents

  - id: agent-frontmatter-lint
    criteria: Agent frontmatter uses the official handoffs object syntax and passes repository lint rules for names, targets, tools, and handoff contracts.
    input: Run the Project Khepri custom-agent frontmatter linter.
    expected_output:
      handoffs_schema:
        - label
        - agent
        - prompt
        - send
      lint_script: scripts/lint-agent-frontmatter.mjs
      enforced_fields:
        - name
        - description
        - target
        - tools
        - handoffs
    assertions:
      - name: agent-frontmatter-lint
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: agent-frontmatter-lint

  - id: bounded-agent-contracts
    criteria: Every bounded-domain agent defines inputs, outputs, guardrails, and handoffs so the flow is repeatable.
    input: Inspect all custom agent prompts for explicit operating contracts.
    expected_output:
      required_sections:
        - Inputs
        - Outputs
        - Guardrails
        - Handoffs
    assertions:
      - name: bounded-agent-contracts
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: bounded-agent-contracts

  - id: least-privilege-tools
    criteria: Agent tool access matches each role's write and execution responsibilities.
    input: Inspect each custom agent frontmatter tools list.
    expected_output:
      policy: Read-only agents do not get edit or execute tools; implementation agents get only the write or shell tools they need.
    assertions:
      - name: least-privilege-tools
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: least-privilege-tools

  - id: docs-branch-flow-coverage
    criteria: The custom agents cover the full implemented modernization flow captured in the current workflow docs and .NET contract.
    input: Compare custom agent prompts to the implemented modernization phases.
    expected_output:
      phases:
        - legacy system IR collection
        - legacy knowledge indexing
        - regression suite planning
        - regression suite generation
        - regression suite execution
        - target system knowledge indexing
        - target scaffolding
        - minimal type scaffold
        - target tests
        - test feedback implementation
        - modernization assessment
        - agent skills
        - continuous evolution
        - parallel improvement
        - steering
    assertions:
      - name: docs-branch-flow-coverage
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: docs-branch-flow-coverage

  - id: evolution-agent
    criteria: The khepri-evolution custom agent manages project agent skills, hooks, steering, and modernization-improvement recommendations in adherence to agentskills.io.
    input: Inspect .github/agents/khepri-evolution.md.
    expected_output:
      agent_profile: khepri-evolution
      responsibilities:
        - create and improve agent skills
        - run alongside all other agent work as a continuous improvement companion
        - suggest agents, skills, MCPs, tools, hooks, plugins, instructions, prompts, and workflows that improve modernization outcomes
        - use the official Awesome Copilot MCP server as a configured tool
        - follow agentskills.io SKILL.md constraints
        - maintain learn skill and hook
        - preserve STEERING.md
      mcp_tool: awesome-copilot/*
    assertions:
      - name: evolution-agent
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: evolution-agent

  - id: spec-agent-agent-eval-contract
    criteria: The khepri-spec custom agent turns agent implementation requirements into AgentEvals/AgentV scenarios before implementation work begins.
    input: Inspect .github/agents/khepri-spec.md for agent-eval scenario authoring responsibilities.
    expected_output:
      agent_profile: khepri-spec
      responsibilities:
        - describe agent implementation behavior as acceptance criteria
        - create or update AgentEvals/AgentV EVAL.yaml scenarios before prompt/profile changes
        - include deterministic code-grader coverage where possible
        - hand off eval scenarios and expected red signal to TDD agents
    assertions:
      - name: spec-agent-agent-eval-contract
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: spec-agent-agent-eval-contract

  - id: evolution-agent-agentv-tdd
    criteria: The khepri-evolution custom agent uses AgentEvals/AgentV as a TDD loop for improving agent implementations.
    input: Inspect .github/agents/khepri-evolution.md for baseline/candidate AgentV iteration behavior.
    expected_output:
      agent_profile: khepri-evolution
      workflow:
        - write scenarios first
        - run baseline AgentV evaluation
        - run candidate AgentV evaluation
        - compare results
        - review failures
        - make one targeted improvement
        - rerun until no regressions
    assertions:
      - name: evolution-agent-agentv-tdd
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: evolution-agent-agentv-tdd

  - id: evolution-agent-iteration-discipline
    criteria: The khepri-evolution custom agent manages improvement iterations with explicit hypotheses, score tracking, stop conditions, rollback plans, and next experiments.
    input: Inspect .github/agents/khepri-evolution.md for a repeatable iteration discipline beyond a single red/green pass.
    expected_output:
      agent_profile: khepri-evolution
      workflow:
        - maintain an improvement backlog
        - record each iteration hypothesis and expected score movement
        - compare baseline and candidate scores
        - list changed files and rollback plan
        - stop when the condition is met and name residual risk or next experiment
    assertions:
      - name: evolution-agent-iteration-discipline
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: evolution-agent-iteration-discipline

  - id: evolution-agent-tdd-evidence
    criteria: The khepri-evolution custom agent requires red and green AgentV evidence with commands, exit status, artifact paths, focused checks, broader validation, and unchanged assertion strength.
    input: Inspect .github/agents/khepri-evolution.md for evidence reporting requirements in the agent-implementation TDD loop.
    expected_output:
      agent_profile: khepri-evolution
      workflow:
        - update scenario before implementation
        - capture red command and red evidence showing expected failure
        - capture green command, exit status, and artifact path
        - run focused check before broader validation
        - do not weaken assertions just to pass
    assertions:
      - name: evolution-agent-tdd-evidence
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: evolution-agent-tdd-evidence

  - id: evolution-agent-techstack-specialization
    criteria: The khepri-evolution custom agent can create and refine techstack-specific agents, skills, hooks, MCP servers, and runtime knowledge for legacy-to-target modernization work.
    input: Inspect .github/agents/khepri-evolution.md for specialist creation, legacy and target runtime learning, and simulation/emulation/test guidance.
    expected_output:
      agent_profile: khepri-evolution
      responsibilities:
        - create techstack-specific agents and skills when repeated modernization work needs specialist expertise
        - create hooks and MCP servers when deterministic automation or reusable tool access is needed
        - maintain legacy and target system knowledge packets with install, run, simulate, emulate, and test commands
        - iterate specialists from AgentV evidence and retire or narrow them when they stop helping
    assertions:
      - name: evolution-agent-techstack-specialization
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: evolution-agent-techstack-specialization

  - id: evolution-agent-specialist-artifact-coverage
    criteria: The khepri-evolution custom agent defines complete artifact coverage for durable specialists across agent profiles, skills, hooks, MCP servers, evaluation scenarios, security review, maintenance, and deprecation.
    input: Inspect .github/agents/khepri-evolution.md for required checklists before creating techstack-specific durable surfaces.
    expected_output:
      agent_profile: khepri-evolution
      required_artifacts:
        - agent profile checklist with tools and handoff owner
        - skill authoring checklist with invocation examples
        - hook automation checklist
        - MCP server contract with tool access model
        - evaluation scenarios, security review, maintenance owner, and deprecation signal
    assertions:
      - name: evolution-agent-specialist-artifact-coverage
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: evolution-agent-specialist-artifact-coverage

  - id: tdd-agents-agent-evals
    criteria: The khepri-code and khepri-test custom agents enforce red/green/refactor AgentEvals evidence for agent prompt/profile implementation changes.
    input: Inspect .github/agents/khepri-code.md and .github/agents/khepri-test.md for AgentV-backed TDD behavior.
    expected_output:
      agent_profiles:
        - khepri-code
        - khepri-test
      responsibilities:
        - require failing AgentV eval or code-grader before agent implementation changes
        - implement the smallest prompt/profile change needed to pass
        - rerun focused evals and broader validation
        - report red and green evidence with commands and exit status
    assertions:
      - name: tdd-agents-agent-evals
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: tdd-agents-agent-evals

  - id: security-modernization-pattern-agent
    criteria: The security-modernization custom agent advises Project Khepri increments with threat modeling, identity and access, secrets, vulnerability remediation, compliance, security regression checks, and rollback guidance before planner acceptance.
    input: Inspect .github/agents/security-modernization.md for security modernization patterns, risk gates, sample-pack guidance, and planner/assessor handoffs.
    expected_output:
      agent_profile: security-modernization
      responsibilities:
        - provide security modernization patterns with when-to-use guidance
        - identify threat-model deltas, identity and access risks, secrets rotation, vulnerability remediation, and compliance checks
        - require security regression checks, compensating controls, and rollback gates
        - hand security risk guidance to khepri-planner and khepri-modernization-assessor
        - tie generated squads back to evals/legacy-samples evidence when applicable
    assertions:
      - name: security-modernization-pattern-agent
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: security-modernization-pattern-agent

  - id: squad-generator-agent
    criteria: A dedicated khepri-squad-generator custom agent owns SDK-first squad generation with AgentEvals/AgentV scenarios, evaluators, test data, squad members, rubrics, and red/green evidence.
    input: Inspect .github/agents/khepri-squad-generator.md for squad-generation responsibilities and least-privilege tool access.
    expected_output:
      agent_profile: khepri-squad-generator
      responsibilities:
        - generate SDK-first squad.config.ts updates
        - generate AgentV scenarios before squad member changes
        - generate evaluators, test data, and squad members
        - define a squad member rubric and live-eval loop
        - improve squad members when they steer too far from the rubric
        - report RED and GREEN evidence
    assertions:
      - name: squad-generator-agent
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: squad-generator-agent

  - id: squad-generation-rubric-live-eval-loop
    criteria: The Khepri workflow routes squad generation through a rubric-backed live-eval loop that runs during test/dev work and uses multiple improvement iterations before implementation proceeds.
    input: Inspect Khepri custom agents for TDD using AgentEvals, generated scenarios/evaluators/test data, and rubric-driven squad member improvement.
    expected_output:
      workflow:
        - write AgentV scenarios first
        - generate or update evaluators and test data
        - generate SDK-first squad members
        - grade squad behavior against a clear rubric
        - run live-evals in the test/dev loop
        - improve members that steer too far from the rubric
        - repeat focused reruns before broader validation
    assertions:
      - name: squad-generation-rubric-live-eval-loop
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: squad-generation-rubric-live-eval-loop

  - id: sdk-squad-generator-config
    criteria: The SDK-first Squad config includes a squad-generator member and routing/skill guidance for rubric-backed AgentEvals, evaluators, test data, and live-eval iteration.
    input: Inspect squad.config.ts for SDK-first squad-generator configuration.
    expected_output:
      squad_config: squad.config.ts
      required_terms:
        - defineSquad
        - defineAgent
        - squad-generator
        - SDK-first squad
        - AgentEvals
        - evaluators
        - test data
        - squad member rubric
        - live-evals
        - multiple improvement loops
    assertions:
      - name: sdk-squad-generator-config
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: sdk-squad-generator-config

  - id: knowledge-agent-queryable-kb-tool-discovery
    criteria: The knowledge agent models extracted knowledge as a queryable knowledge base by discovering available knowledge-modeling tools, MCPs, skills, wiki surfaces, databases, and graph stores without requiring users to name a specific capability.
    input: Inspect .github/agents/khepri-knowledge.md for queryable knowledge-base capability discovery and validation behavior.
    expected_output:
      agent_profile: khepri-knowledge
      responsibilities:
        - discover available knowledge-modeling capabilities
        - consider tools, skills, MCP servers, wiki surfaces, databases, and graph stores
        - select the best available capability without requiring a user-named tool
        - fall back to a repository-owned knowledge manifest when no queryable surface is available
        - run a query smoke check and record the selected capability
    assertions:
      - name: knowledge-agent-queryable-kb-tool-discovery
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: knowledge-agent-queryable-kb-tool-discovery

  - id: knowledge-agent-legacy-kb-modeling
    criteria: Legacy knowledge extraction and generation hand off to the knowledge agent so source-backed requirements, IR, and regression seed tests become queryable knowledge-base entries.
    input: Inspect Khepri custom agents for legacy knowledge extraction and generation coverage through the queryable knowledge agent.
    expected_output:
      stage_id: legacy-requirements-specs-tests
      required_agent: khepri-knowledge
      required_guidance:
        - legacy knowledge extraction
        - legacy knowledge generation
        - source-backed requirements
        - intermediary representations
        - regression seed tests
        - queryable knowledge base
    assertions:
      - name: knowledge-agent-legacy-kb-modeling
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: knowledge-agent-legacy-kb-modeling

  - id: knowledge-agent-target-kb-modeling
    criteria: Desired-state knowledge extraction and generation hand off to the knowledge agent so target requirements, target specs, acceptance criteria, and test plans become queryable knowledge-base entries.
    input: Inspect Khepri custom agents for desired-state knowledge extraction and generation coverage through the queryable knowledge agent.
    expected_output:
      stage_id: target-requirements-specs-test-plans
      required_agent: khepri-knowledge
      required_guidance:
        - desired-state knowledge extraction
        - desired-state knowledge generation
        - target requirements
        - target specs
        - test-PLANS
        - acceptance criteria
        - queryable knowledge base
    assertions:
      - name: knowledge-agent-target-kb-modeling
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: knowledge-agent-target-kb-modeling

  - id: knowledge-agent-refinement-loop
    criteria: Modernization dev/test loops use the knowledge agent to refine queryable knowledge and coordinate steering behavior updates from test feedback, verification evidence, and user corrections.
    input: Inspect Khepri custom agents for intra-modernization knowledge refinement and steering behavior coverage.
    expected_output:
      responsibilities:
        - refine the knowledge base during modernization dev/test loops
        - index test feedback and verification evidence
        - keep steering behavior updates traceable through STEERING.md and learn
        - preserve red/green/refactor evidence in queryable context
    assertions:
      - name: knowledge-agent-refinement-loop
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: knowledge-agent-refinement-loop

  - id: requested-tooling-installation
    criteria: The requested APM package, skills, AgentV-adjacent MCP/plugin config, and ADR agent artifacts are installed in project scope.
    input: Inspect installed project tooling and generated configuration.
    expected_output:
      apm_dependency: danielmeppiel/form-builder
      project_skills:
        - sensei
        - editorconfig
        - microsoft-skill-creator
        - create-architectural-decision-record
      project_agent: adr-generator.agent.md
      mcp_server: microsoft-learn
      plugin: microsoftdocs/mcp
      compiled_context: AGENTS.md
    assertions:
      - name: requested-tooling-installation
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: requested-tooling-installation

  - id: learn-skill-hook
    criteria: The learn agent skill and GitHub hook capture user corrections as succinct generalized steering.
    input: Inspect .github/skills/learn and .github/hooks/learn.json.
    expected_output:
      skill: .github/skills/learn/SKILL.md
      hook: .github/hooks/learn.json
      target: STEERING.md
    assertions:
      - name: learn-skill-hook
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: learn-skill-hook

  - id: architecture-docs-skill-hook
    criteria: The architecture documentation agent skill and GitHub hook require docs and Mermaid diagrams to stay aligned with implemented architecture changes.
    input: Inspect the architecture documentation skill and hook.
    expected_output:
      skill: .github/skills/keep-architecture-docs-current/SKILL.md
      hook: .github/hooks/architecture-docs.json
      instructions: .github/instructions/architecture-docs.instructions.md
      docs: docs/architecture/README.md
    assertions:
      - name: architecture-docs-skill-hook
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: architecture-docs-skill-hook

  - id: steering-consumption
    criteria: All Khepri custom agents use STEERING.md so chat corrections affect future work.
    input: Inspect STEERING.md and every .github/agents profile.
    expected_output:
      steering_file: STEERING.md
      all_agents_reference_steering: true
    assertions:
      - name: steering-consumption
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: steering-consumption

  - id: agent-skills-spec-compliance
    criteria: The learn project skill follows the Agent Skills specification from agentskills.io.
    input: Validate the learn skill folder structure, frontmatter, and concise body.
    expected_output:
      project_skill_root: .github/skills
      required_file: SKILL.md
      required_frontmatter:
        - name
        - description
    assertions:
      - name: agent-skills-spec-compliance
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: agent-skills-spec-compliance

  - id: spec-kit-skill
    criteria: The Project Khepri Spec Kit skill is a complete Agent Skill package with concise frontmatter, progressive references, validation script, and eval prompts.
    input: Validate .github/skills/spec-kit.
    expected_output:
      skill: .github/skills/spec-kit/SKILL.md
      required_references:
        - references/cli.md
        - references/slash-commands.md
        - references/agents-and-integrations.md
        - references/workflow.md
        - references/skill-standard.md
        - references/sources.md
      required_script: scripts/check-spec-kit.ps1
      required_evals: evals/evals.json
    assertions:
      - name: spec-kit-skill
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: spec-kit-skill

  - id: spec-agent-speckit-skill-contract
    criteria: The khepri-spec custom agent tells future agents when and how to use the local Spec Kit skill, CLI, slash-command equivalents, and agent integrations.
    input: Inspect .github/agents/khepri-spec.md for local spec-kit skill usage guidance.
    expected_output:
      agent_profile: khepri-spec
      skill_reference: .github/skills/spec-kit/SKILL.md
      required_commands:
        - $speckit-constitution
        - $speckit-specify
        - $speckit-plan
        - $speckit-tasks
        - $speckit-implement
      required_cli:
        - specify init
        - Codex skills integration
    assertions:
      - name: spec-agent-speckit-skill-contract
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: spec-agent-speckit-skill-contract

  - id: maf-ghcp-modernization-workflow
    criteria: The repository enforces the modernization workflow in Microsoft Agent Framework code using the GitHub Copilot SDK, registered subagents, AgentEvals-backed TDD, and app/data/infra/security modernization pattern agents.
    input: Inspect the .NET modernization workflow, GHCP SDK registry, custom agent profiles, and package references.
    expected_output:
      workflow_project: dotnet/src/Modernization/Workflow/Khepri.Modernization.Workflow.csproj
      required_packages:
        - GitHub.Copilot.SDK
        - Microsoft.Agents.AI.GitHub.Copilot
        - Microsoft.Agents.AI.Workflows
      required_stages:
        - legacy-requirements-specs-tests
        - target-requirements-specs-test-plans
        - incremental-modernization-plan
        - increment-area-squads
        - current-stage-plan-refinement
        - tdd-modernization-execution
      required_agents:
        - khepri-orchestrator
        - khepri-spec
        - khepri-knowledge
        - khepri-planner
        - khepri-scaffold
        - khepri-code
        - khepri-test
        - khepri-modernization-assessor
        - khepri-evolution
        - app-modernization
        - data-modernization
        - infra-modernization
        - security-modernization
      evidence:
        - AgentEvals
        - agentevals.io
        - tool_trajectory
        - llm_judge
        - rubric
        - CreateAgentCallPlan
        - tool-calling
        - relevance
        - evidence-completeness
        - legacy regression
        - red/green/refactor
    assertions:
      - name: maf-ghcp-modernization-workflow
        type: code-grader
        command: [node, ./check-khepri-agents.mjs]
        cwd: ./evals/github-agents
        config:
          check: maf-ghcp-modernization-workflow

  - id: modernization-workflow-skill
    criteria: The Microsoft Agent Framework modernization workflow is exposed as a repo-local Agent Skill that instructs agents to call the existing .NET workflow code, and the orchestrator can invoke it.
    input: Inspect .github/skills/khepri-modernization-workflow, the GHCP SDK registry, and the orchestrator profile for workflow skill invocation.
    expected_output:
      skill: .github/skills/khepri-modernization-workflow/SKILL.md
      skill_name: khepri-modernization-workflow
      calls_existing_code:
        - dotnet/src/Modernization/Workflow/ModernizationWorkflow.cs
        - dotnet/src/Modernization/Workflow/GitHubCopilotModernizationAgentRegistry.cs
        - ModernizationWorkflow.CreateContract
        - BuildMicrosoftAgentFrameworkWorkflow
        - BuildIncrementSquadWorkflow
      invoker: khepri-orchestrator
      validation:
        - dotnet test dotnet\tests\Code2\NL\Code2NL.Tests.csproj
        - npm run eval:agents
    assertions:
      - name: modernization-workflow-skill
        type: code-grader
