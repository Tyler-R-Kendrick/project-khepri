    input: "Inspect Khepri custom agents for legacy sample pack usage guidance across spec, planner, test, assessor, and app/data/infra/security modernization agents."
    expected_output:
      required_agents:
        - khepri-spec
        - khepri-planner
        - khepri-test
        - khepri-modernization-assessor
        - app-modernization
        - data-modernization
        - infra-modernization
        - security-modernization
      required_guidance:
        - evals/legacy-samples
        - sample pack
        - replay command
        - edge-case fixture
        - regression evidence
        - generated squad
    assertions:
      - name: custom-legacy-sample-pack
        type: code-grader
        command: [node, ./evaluators/legacy-sample-pack.mjs]
        cwd: ./evals/github-agents
        config:
          check: agent-guidance
